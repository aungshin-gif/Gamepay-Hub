<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gamepay Hub - Digital Products Store</title>

  <style>
    :root{
      --bg1:#12001f;
      --bg2:#250040;
      --bg3:#4b008f;
      --bg4:#8b2cff;
      --bg5:#d05cff;

      --text:#ffffff;
      --muted:rgba(255,255,255,.72);

      --glass:rgba(255,255,255,.08);
      --glass-2:rgba(255,255,255,.05);
      --border:rgba(255,255,255,.14);

      --neon:#c77dff;
      --neon-2:#9d4edd;
      --neon-3:#f15cff;
      --cyan:#7df9ff;
      --good:#9bffc2;

      --radius-xl:28px;
      --radius-lg:22px;
      --radius-md:16px;
      --radius-sm:12px;

      --shadow:0 16px 40px rgba(0,0,0,.35);
      --shadow-neon:0 0 26px rgba(199,125,255,.28);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      width:100%;
      max-width:100%;
      overflow-x:hidden;
      scroll-behavior:smooth;
    }

    body{
      min-height:100vh;
      font-family:Arial,Helvetica,sans-serif;
      color:var(--text);
      overflow-x:hidden;
      background:
        radial-gradient(circle at 18% 20%, rgba(255,255,255,.10) 0%, transparent 18%),
        radial-gradient(circle at 82% 24%, rgba(199,125,255,.18) 0%, transparent 22%),
        radial-gradient(circle at 50% 82%, rgba(125,249,255,.10) 0%, transparent 22%),
        linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 25%, var(--bg3) 55%, var(--bg4) 82%, var(--bg5) 100%);
      background-size:200% 200%;
      animation:bgMove 38s linear infinite;
      transform:translateZ(0);
      will-change:transform;
    }

    @keyframes bgMove{
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    #particles{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      z-index:0;
      pointer-events:none;
      opacity:.9;
      transform:translateZ(0);
    }

    .page{
      position:relative;
      z-index:1;
      width:min(1220px, 94%);
      margin:0 auto;
      padding:20px 0 50px;
      transform:translateZ(0);
    }

    .hero{
      text-align:center;
      padding:8px 0 18px;
    }

    .brand-wrap{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      margin-bottom:8px;
    }

    .brand-orb{
      width:56px;
      height:56px;
      border-radius:50%;
      background:
        radial-gradient(circle at 30% 30%, #fff 0%, #ffe083 12%, #d58bff 38%, #8b2cff 70%, #3a0064 100%);
      box-shadow:
        0 0 18px rgba(255,255,255,.28),
        0 0 30px rgba(199,125,255,.45),
        0 0 55px rgba(139,44,191,.35);
      animation:orbPulse 2.6s ease-in-out infinite alternate;
      flex-shrink:0;
    }

    @keyframes orbPulse{
      from{transform:scale(1);}
      to{transform:scale(1.08);}
    }

    .hero-title{
      font-size:clamp(30px, 5vw, 52px);
      font-weight:900;
      letter-spacing:.5px;
      background:linear-gradient(90deg,#fff4a8 0%, #ffffff 28%, #f6d2ff 60%, #c77dff 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      text-shadow:
        0 0 12px rgba(255,255,255,.14),
        0 0 24px rgba(199,125,255,.26),
        0 0 50px rgba(157,78,221,.20);
    }

    .hero-sub{
      margin-top:6px;
      font-size:14px;
      color:var(--muted);
      letter-spacing:.4px;
    }

    .search-wrap{
      width:min(760px, 100%);
      margin:18px auto 12px;
      position:relative;
    }

    .search-wrap input{
      width:100%;
      padding:16px 18px 16px 48px;
      border:none;
      outline:none;
      border-radius:18px;
      color:#fff;
      font-size:15px;
      background:rgba(255,255,255,.09);
      border:1px solid rgba(255,255,255,.16);
      box-shadow:
        0 0 18px rgba(199,125,255,.18),
        inset 0 0 12px rgba(255,255,255,.08);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      transition:.22s ease;
    }

    .search-wrap input:focus{
      border-color:rgba(199,125,255,.45);
      box-shadow:
        0 0 22px rgba(199,125,255,.28),
        0 0 48px rgba(157,78,221,.14),
        inset 0 0 10px rgba(255,255,255,.10);
    }

    .search-wrap input::placeholder{
      color:rgba(255,255,255,.58);
    }

    .search-icon{
      position:absolute;
      left:16px;
      top:50%;
      transform:translateY(-50%);
      pointer-events:none;
      opacity:.8;
      font-size:17px;
    }

    .categories{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
      margin-bottom:20px;
    }

    .cat{
      padding:10px 16px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      font-size:13px;
      cursor:pointer;
      user-select:none;
      transition:.22s ease;
      box-shadow:0 0 10px rgba(199,125,255,.06);
    }

    .cat:hover,
    .cat.active{
      transform:translateY(-2px);
      background:rgba(199,125,255,.16);
      border-color:rgba(199,125,255,.42);
      box-shadow:0 0 18px rgba(199,125,255,.22);
    }

    .layout{
      display:grid;
      grid-template-columns:minmax(0,1fr) 390px;
      gap:20px;
      align-items:start;
    }

    .products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(185px,1fr));
      gap:18px;
    }

    .card{
      position:relative;
      border-radius:24px;
      padding:18px 14px 16px;
      background:rgba(37,0,58,.86);
      border:1px solid rgba(199,125,255,.18);
      box-shadow:var(--shadow), inset 0 0 0 1px rgba(255,255,255,.02);
      cursor:pointer;
      transition:transform .28s ease, box-shadow .28s ease, border-color .28s ease;
      overflow:hidden;
      min-height:225px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      transform:translateZ(0);
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,.08), transparent 42%, transparent 60%, rgba(199,125,255,.10));
      pointer-events:none;
    }

    .card:hover{
      transform:translateY(-8px) scale(1.02);
      border-color:rgba(199,125,255,.42);
      box-shadow:
        0 18px 45px rgba(0,0,0,.42),
        0 0 30px rgba(199,125,255,.24);
    }

    .icon-wrap{
      width:78px;
      height:78px;
      border-radius:50%;
      margin:0 auto 12px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:10px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 0 18px rgba(199,125,255,.18);
    }

    .card img{
      width:100%;
      height:100%;
      object-fit:contain;
      border-radius:50%;
      transition:transform .28s ease, filter .28s ease;
    }

    .card:hover img{
      transform:scale(1.07);
      filter:drop-shadow(0 0 18px rgba(199,125,255,.55));
    }

    .card-name{
      font-size:16px;
      font-weight:800;
      line-height:1.25;
      text-align:center;
    }

    .card-sub{
      margin-top:6px;
      font-size:12px;
      color:var(--muted);
      text-align:center;
    }

    .badge{
      position:absolute;
      top:12px;
      right:12px;
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:6px 10px;
      border-radius:999px;
      font-size:11px;
      background:rgba(155,255,194,.10);
      border:1px solid rgba(155,255,194,.22);
      color:#effff4;
    }

    .price-from{
      margin-top:12px;
      font-size:12px;
      color:rgba(255,255,255,.68);
      text-align:center;
    }

    .side{
      position:sticky;
      top:18px;
    }

    .panel{
      background:rgba(28,0,43,.84);
      border:1px solid rgba(255,255,255,.10);
      border-radius:26px;
      padding:18px;
      box-shadow:var(--shadow), 0 0 30px rgba(199,125,255,.12);
      text-align:left;
    }

    .panel-title{
      text-align:center;
      font-size:22px;
      font-weight:900;
      margin-bottom:8px;
      text-shadow:0 0 16px rgba(199,125,255,.18);
    }

    .panel-sub{
      text-align:center;
      font-size:12px;
      color:var(--muted);
      margin-bottom:14px;
    }

    .cart-empty{
      text-align:center;
      padding:26px 10px;
      border-radius:16px;
      background:rgba(255,255,255,.04);
      border:1px dashed rgba(255,255,255,.12);
      color:var(--muted);
      font-size:13px;
      line-height:1.55;
    }

    .cart-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .cart-item{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:12px;
    }

    .cart-head{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
    }

    .cart-name{
      font-size:14px;
      font-weight:800;
      line-height:1.25;
    }

    .cart-plan{
      margin-top:4px;
      font-size:12px;
      color:var(--muted);
      line-height:1.4;
    }

    .remove-btn{
      flex-shrink:0;
      border:none;
      border-radius:10px;
      padding:6px 10px;
      font-size:12px;
      background:rgba(255,158,184,.14);
      color:#fff;
      border:1px solid rgba(255,158,184,.24);
      cursor:pointer;
    }

    .toggle-btn{
      margin-top:10px;
      width:100%;
      border:none;
      border-radius:12px;
      padding:10px;
      background:rgba(255,255,255,.06);
      color:#fff;
      border:1px solid rgba(255,255,255,.10);
      font-size:12px;
      font-weight:700;
      cursor:pointer;
    }

    .plan-list{
      display:grid;
      gap:8px;
      margin-top:10px;
    }

    .plan-option{
      padding:10px;
      border-radius:12px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      font-size:12px;
      line-height:1.45;
      cursor:pointer;
      transition:.2s ease;
    }

    .plan-option.active{
      background:rgba(199,125,255,.15);
      border-color:rgba(199,125,255,.42);
      box-shadow:0 0 18px rgba(199,125,255,.18);
    }

    .qty-row{
      margin-top:12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .qty-box{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .qty-btn{
      width:28px;
      height:28px;
      border:none;
      border-radius:50%;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.12);
      color:#fff;
      cursor:pointer;
      font-size:16px;
      line-height:1;
    }

    .qty-num{
      min-width:26px;
      text-align:center;
      font-size:14px;
      font-weight:800;
    }

    .amount{
      font-size:13px;
      font-weight:800;
    }

    .summary{
      margin-top:16px;
      padding-top:14px;
      border-top:1px solid rgba(255,255,255,.10);
      display:grid;
      gap:10px;
    }

    .line{
      display:flex;
      justify-content:space-between;
      gap:12px;
      font-size:14px;
    }

    .line-total{
      display:flex;
      justify-content:space-between;
      gap:12px;
      font-size:18px;
      font-weight:800;
      text-shadow:0 0 16px rgba(199,125,255,.18);
    }

    .field{
      margin-top:16px;
    }

    .field-title{
      font-size:13px;
      font-weight:800;
      margin-bottom:10px;
    }

    .input,
    .note-box{
      width:100%;
      border:none;
      outline:none;
      border-radius:18px;
      padding:13px 14px;
      color:#fff;
      font-size:14px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      box-shadow:
        0 0 18px rgba(199,125,255,.12),
        inset 0 0 10px rgba(255,255,255,.06);
      transition:.22s ease;
    }

    .input:focus,
    .note-box:focus{
      border-color:rgba(199,125,255,.42);
      box-shadow:
        0 0 22px rgba(199,125,255,.22),
        0 0 46px rgba(157,78,221,.10),
        inset 0 0 10px rgba(255,255,255,.08);
    }

    .input::placeholder,
    .note-box::placeholder{
      color:rgba(255,255,255,.52);
    }

    .note-box{
      min-height:92px;
      resize:vertical;
      line-height:1.55;
    }

    .pay-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0,1fr));
      gap:10px;
    }

    .pay-option{
      padding:12px 10px;
      border-radius:14px;
      text-align:center;
      cursor:pointer;
      font-size:13px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.12);
      transition:.22s ease;
      user-select:none;
    }

    .pay-option.active{
      background:rgba(199,125,255,.17);
      border-color:rgba(199,125,255,.45);
      box-shadow:0 0 18px rgba(199,125,255,.22);
    }

    .telegram-btn{
      position:relative;
      width:100%;
      margin-top:18px;
      border:none;
      border-radius:18px;
      padding:15px 16px;
      color:#fff;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
      overflow:hidden;
      background:linear-gradient(90deg, #7b2cff, #c24dff, #7b2cff);
      background-size:200% 100%;
      animation:btnFlow 3s linear infinite;
      box-shadow:
        0 0 18px rgba(199,125,255,.34),
        0 0 40px rgba(157,78,221,.18);
    }

    .telegram-btn::before{
      content:"";
      position:absolute;
      inset:-45%;
      background:linear-gradient(120deg, transparent, rgba(255,255,255,.28), transparent);
      transform:rotate(25deg);
      animation:btnGlow 3.2s linear infinite;
      pointer-events:none;
    }

    .telegram-btn:disabled{
      opacity:.6;
      cursor:not-allowed;
      box-shadow:none;
      animation:none;
    }

    @keyframes btnFlow{
      0%{background-position:0% 50%;}
      100%{background-position:200% 50%;}
    }

    @keyframes btnGlow{
      0%{transform:translateX(-120%) rotate(25deg);}
      100%{transform:translateX(220%) rotate(25deg);}
    }

    .preview{
      margin-top:16px;
      padding:14px;
      border-radius:18px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
    }

    .preview-title{
      font-size:13px;
      font-weight:800;
      margin-bottom:10px;
    }

    .preview-box{
      white-space:pre-wrap;
      word-break:break-word;
      overflow-wrap:anywhere;
      font-size:12px;
      line-height:1.6;
      color:#f7efff;
      text-align:left;
    }

    .footer{
      margin-top:34px;
      text-align:center;
      padding:22px 10px 10px;
      font-size:14px;
      font-weight:700;
      color:#efd6ff;
      border-top:1px solid rgba(199,125,255,.20);
      text-shadow:
        0 0 10px rgba(199,125,255,.55),
        0 0 20px rgba(157,78,221,.35);
    }

    .hidden{
      display:none !important;
    }

    @media (max-width: 980px){
      .layout{
        grid-template-columns:1fr;
      }
      .side{
        position:static;
      }
    }

    @media (max-width: 640px){
      .page{
        width:min(96%, 96%);
      }
      .products{
        grid-template-columns:repeat(2, minmax(0,1fr));
        gap:14px;
      }
      .card{
        min-height:210px;
        padding:16px 10px 14px;
      }
      .icon-wrap{
        width:68px;
        height:68px;
      }
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>

  <div class="page">
    <div class="hero">
      <div class="hero-title">Gamepay Hub</div>
      <div class="hero-sub">Digital Products Store</div>
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔎</span>
      <input id="searchInput" type="text" placeholder="Search products..." />
    </div>

    <div class="categories" id="categories"></div>

    <div class="layout">
      <div>
        <div class="products" id="products"></div>
      </div>

      <div class="side">
        <div class="panel">
          <div class="panel-title">Order Cart</div>
          <div class="panel-sub">Neon glow order system</div>

          <div id="cartEmpty" class="cart-empty">
            No items selected yet.
          </div>

          <div id="cartList" class="cart-list hidden"></div>

          <div id="summaryBlock" class="summary hidden">
            <div class="line"><span>Selected Items</span><span id="sumItems">0</span></div>
            <div class="line"><span>Quantity</span><span id="sumQty">0</span></div>
            <div class="line"><span>Amount</span><span id="sumAmount">0 Ks</span></div>
            <div class="line-total"><span>Total</span><span id="sumTotal">0 Ks</span></div>
          </div>

          <div class="field">
            <div class="field-title">Description</div>
            <div id="descriptionBox" class="preview-box" style="border-radius:18px;background:rgba(255,255,255,.05);border:1px solid rgba(199,125,255,.22);padding:14px;box-shadow:0 0 18px rgba(199,125,255,.12), inset 0 0 10px rgba(255,255,255,.04);min-height:86px;">
              Select a product to see description.
            </div>
          </div>

          <div class="field">
            <div class="field-title">Account / Email / Username</div>
            <input id="accountInput" class="input" type="text" placeholder="Enter account..." />
          </div>

          <div class="field">
            <div class="field-title">Payment Method</div>
            <div class="pay-grid" id="payGrid"></div>
          </div>

          <div class="field">
            <div class="field-title">Note</div>
            <textarea id="noteInput" class="note-box" placeholder="Write note here..."></textarea>
          </div>

          <button id="orderBtn" class="telegram-btn" disabled>Order via Telegram</button>

          <div class="preview">
            <div class="preview-title">Order Preview</div>
            <div id="previewBox" class="preview-box">No order preview yet.</div>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      Founder: Diameter Eight
    </div>
  </div>

  <script>
    const TELEGRAM_USERNAME = "angsthtun";

    const categories = ["All", "AI", "Editing", "VPN", "Gift", "Music", "Video", "Social", "Services"];

    const products = [
      {
        id: "chatgpt",
        name: "ChatGPT",
        subtitle: "Tap to see prices",
        badge: "available",
        category: "AI",
        icon: "ChatGPT_logo.svg.png",
        search: "chatgpt openai ai",
        description: "Get ChatGPT plans for AI chat, writing, coding, daily work and fast productivity support.",
        plans: [
          { name: "ChatGPT Plus - 1 Month - 6000 Ks (Share)", price: 6000 },
          { name: "ChatGPT Plus - 1 Month - 6500 Ks (Private)", price: 6500 },
          { name: "ChatGPT Plus - 3 Months - 10000 Ks (Share)", price: 10000 },
          { name: "ChatGPT Plus - 3 Months - 12000 Ks (Private)", price: 12000 },
          { name: "ChatGPT Business - 1 Month - 6000 Ks (Share)", price: 6000 },
          { name: "ChatGPT Business - 12 Months - 22000 Ks (Share)", price: 22000 },
          { name: "ChatGPT Business - 12 Months - 23000 Ks (Private)", price: 23000 }
        ]
      },
      {
        id: "spotify",
        name: "Spotify",
        subtitle: "Tap to see prices",
        badge: "available",
        category: "Music",
        icon: "https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg",
        search: "spotify music premium",
        description: "Enjoy premium music streaming with no ads, better quality and smoother listening experience.",
        plans: [
          { name: "Family Plan (Global) - 1 Month - 8000 Ks", price: 8000 },
          { name: "Family Plan (Global) - 2 Months - 12000 Ks", price: 12000 },
          { name: "Family Plan (Global) - 3 Months - 24000 Ks", price: 24000 },
          { name: "Family Plan (Global) - 6 Months - 65000 Ks", price: 65000 },
           { name: "Individual Plan (Global) - 1 Month - 13000 Ks", price: 13000 },
          { name: "Individual Plan (Global) - 2 Months - 24000 Ks", price: 24000 },
          { name: "Individual Plan (Global) - 3 Months - 34000 Ks", price: 34000 }
        ]
      }
    ];

    const paymentMethods = ["KPay", "Wave", "UAB", "AYA", "Binance", "UAB"];

    const cart = [];
    let activeCategory = "All";
    let activePayment = "";

    const productsEl = document.getElementById("products");
    const categoriesEl = document.getElementById("categories");
    const searchInput = document.getElementById("searchInput");
    const cartEmpty = document.getElementById("cartEmpty");
    const cartList = document.getElementById("cartList");
    const summaryBlock = document.getElementById("summaryBlock");
    const sumItems = document.getElementById("sumItems");
    const sumQty = document.getElementById("sumQty");
    const sumAmount = document.getElementById("sumAmount");
    const sumTotal = document.getElementById("sumTotal");
    const accountInput = document.getElementById("accountInput");
    const noteInput = document.getElementById("noteInput");
    const payGrid = document.getElementById("payGrid");
    const orderBtn = document.getElementById("orderBtn");
    const previewBox = document.getElementById("previewBox");
    const descriptionBox = document.getElementById("descriptionBox");

    function formatKs(n){
      return `${Number(n).toLocaleString()} Ks`;
    }

    function getCheapestPrice(product){
      return Math.min(...product.plans.map(p => p.price));
    }

    function buildCategories(){
      categoriesEl.innerHTML = "";
      categories.forEach(cat => {
        const el = document.createElement("div");
        el.className = "cat" + (cat === activeCategory ? " active" : "");
        el.textContent = cat;
        el.onclick = () => {
          activeCategory = cat;
          buildCategories();
          renderProducts();
        };
        categoriesEl.appendChild(el);
      });
    }

    function getFilteredProducts(){
      const q = (searchInput.value || "").trim().toLowerCase();
      return products.filter(p => {
        const categoryOK = activeCategory === "All" || p.category === activeCategory;
        const searchOK = !q || `${p.name} ${p.subtitle} ${p.search} ${p.category}`.toLowerCase().includes(q);
        return categoryOK && searchOK;
      });
    }

    function renderProducts(){
      productsEl.innerHTML = "";
      const list = getFilteredProducts();

      list.forEach(product => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
          <div class="badge">${product.badge}</div>
          <div>
            <div class="icon-wrap">
              <img src="${product.icon}" alt="${product.name}">
            </div>
            <div class="card-name">${product.name}</div>
            <div class="card-sub">${product.subtitle}</div>
          </div>
          <div class="price-from">From ${formatKs(getCheapestPrice(product))}</div>
        `;

        card.onclick = () => addProductToCart(product);
        productsEl.appendChild(card);
      });
    }

    function addProductToCart(product){
      descriptionBox.textContent = product.description || "No description available.";

      const exists = cart.find(item => item.productId === product.id);
      if(exists){
        exists.open = true;
        renderCart();
        return;
      }

      cart.push({
        productId: product.id,
        productName: product.name,
        productDescription: product.description || "",
        plans: product.plans,
        selectedPlanIndex: 0,
        qty: 1,
        open: true
      });

      renderCart();
    }

    function removeItem(productId){
      const index = cart.findIndex(item => item.productId === productId);
      if(index > -1) cart.splice(index, 1);
      renderCart();
    }

    function togglePlans(productId){
      const item = cart.find(i => i.productId === productId);
      if(!item) return;
      item.open = !item.open;
      renderCart();
    }

    function selectPlan(productId, planIndex){
      const item = cart.find(i => i.productId === productId);
      if(!item) return;
      item.selectedPlanIndex = planIndex;
      renderCart();
    }

    function changeQty(productId, delta){
      const item = cart.find(i => i.productId === productId);
      if(!item) return;
      item.qty = Math.max(1, item.qty + delta);
      renderCart();
    }

    function getTotals(){
      let items = cart.length;
      let qty = 0;
      let total = 0;

      cart.forEach(item => {
        const plan = item.plans[item.selectedPlanIndex];
        qty += item.qty;
        total += plan.price * item.qty;
      });

      return { items, qty, total };
    }

    function renderCart(){
      if(cart.length === 0){
        cartEmpty.classList.remove("hidden");
        cartList.classList.add("hidden");
        summaryBlock.classList.add("hidden");
        cartList.innerHTML = "";
        updatePreview();
        return;
      }

      cartEmpty.classList.add("hidden");
      cartList.classList.remove("hidden");
      summaryBlock.classList.remove("hidden");
      cartList.innerHTML = "";

      cart.forEach(item => {
        const currentPlan = item.plans[item.selectedPlanIndex];
        const amount = currentPlan.price * item.qty;

        const wrap = document.createElement("div");
        wrap.className = "cart-item";

        wrap.innerHTML = `
          <div class="cart-head">
            <div style="min-width:0">
              <div class="cart-name">${item.productName}</div>
              <div class="cart-plan">${currentPlan.name}</div>
            </div>
            <button class="remove-btn" onclick="removeItem('${item.productId}')">Remove</button>
          </div>

          <button class="toggle-btn" onclick="togglePlans('${item.productId}')">
            ${item.open ? "Hide Plan Selection" : "Choose Plan"}
          </button>

          ${item.open ? `
            <div class="plan-list">
              ${item.plans.map((plan, idx) => `
                <div class="plan-option ${idx === item.selectedPlanIndex ? "active" : ""}"
                     onclick="selectPlan('${item.productId}', ${idx})">
                  ${plan.name}
                </div>
              `).join("")}
            </div>
          ` : ""}

          <div class="qty-row">
            <div class="qty-box">
              <button class="qty-btn" onclick="changeQty('${item.productId}', -1)">−</button>
              <div class="qty-num">${item.qty}</div>
              <button class="qty-btn" onclick="changeQty('${item.productId}', 1)">+</button>
            </div>
            <div class="amount">${formatKs(amount)}</div>
          </div>
        `;

        cartList.appendChild(wrap);
      });

      const totals = getTotals();
      sumItems.textContent = totals.items;
      sumQty.textContent = totals.qty;
      sumAmount.textContent = formatKs(totals.total);
      sumTotal.textContent = formatKs(totals.total);

      updatePreview();
    }

    function buildPayments(){
      payGrid.innerHTML = "";
      paymentMethods.forEach(method => {
        const el = document.createElement("div");
        el.className = "pay-option" + (activePayment === method ? " active" : "");
        el.textContent = method;
        el.onclick = () => {
          activePayment = method;
          buildPayments();
          updatePreview();
        };
        payGrid.appendChild(el);
      });
    }

    function buildTelegramMessage(){
      if(cart.length === 0) return "";

      const totals = getTotals();
      const productNames = cart.map(item => item.productName).join(", ");
      const planNames = cart.map(item => {
        const plan = item.plans[item.selectedPlanIndex];
        return `${plan.name} x${item.qty}`;
      }).join("\n");
      const note = noteInput.value.trim() || "-";

      let msg = "Gamepay Hub\n";
      msg += "Digital order\n\n";
      msg += `💌Product name: ${productNames}\n`;
      msg += `📄Plan:\n${planNames}\n`;
      msg += `💳Payment method: ${activePayment || "Not selected"}\n`;
      msg += `🧾Total: ${formatKs(totals.total)}\n`;
      msg += `📝Note: ${note}`;

      return msg;
    }

    function updatePreview(){
      const preview = buildTelegramMessage();
      previewBox.textContent = preview || "No order preview yet.";

      const canOrder = cart.length > 0 && activePayment;
      orderBtn.disabled = !canOrder;
    }

    function orderViaTelegram(){
      if(cart.length === 0){
        alert("Please select at least one product.");
        return;
      }

      if(!activePayment){
        alert("Please select a payment method.");
        return;
      }

      const message = buildTelegramMessage();
      const telegramURL = "https://t.me/" + TELEGRAM_USERNAME + "?text=" + encodeURIComponent(message);

      window.location.href = telegramURL;
    }

    searchInput.addEventListener("input", renderProducts);
    noteInput.addEventListener("input", updatePreview);
    accountInput.addEventListener("input", updatePreview);
    orderBtn.addEventListener("click", orderViaTelegram);

    buildCategories();
    buildPayments();
    renderProducts();
    renderCart();

    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");
    let particles = [];
    let mouse = { x:null, y:null, radius:120 };

    function resizeCanvas(){
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      initParticles();
    }

    function initParticles(){
      particles = [];
      const count = Math.min(110, Math.max(60, Math.floor(window.innerWidth / 15)));
      for(let i=0;i<count;i++){
        particles.push({
          x:Math.random() * canvas.width,
          y:Math.random() * canvas.height,
          size:Math.random() * 1.8 + .9,
          vx:(Math.random() - .5) * .35,
          vy:(Math.random() - .5) * .35,
          a:Math.random() * .45 + .18
        });
      }
    }

    window.addEventListener("resize", resizeCanvas);

    window.addEventListener("mousemove", e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    window.addEventListener("touchmove", e => {
      if(e.touches.length){
        mouse.x = e.touches[0].clientX;
        mouse.y = e.touches[0].clientY;
      }
    }, { passive:true });

    function animateParticles(){
      ctx.clearRect(0,0,canvas.width,canvas.height);

      for(let i=0;i<particles.length;i++){
        const p = particles[i];

        p.x += p.vx;
        p.y += p.vy;

        if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if(p.y < 0 || p.y > canvas.height) p.vy *= -1;

        if(mouse.x !== null && mouse.y !== null){
          const dx = p.x - mouse.x;
          const dy = p.y - mouse.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if(dist < mouse.radius){
            p.x += dx / 45;
            p.y += dy / 45;
          }
        }

        ctx.beginPath();
        ctx.fillStyle = "rgba(255,210,255," + p.a + ")";
        ctx.shadowBlur = 24;
        ctx.shadowColor = "#b366ff";
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }

      for(let a=0;a<particles.length;a++){
        for(let b=a+1;b<particles.length;b++){
          const dx = particles[a].x - particles[b].x;
          const dy = particles[a].y - particles[b].y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if(dist < 105){
            ctx.beginPath();
            ctx.strokeStyle = "rgba(220,180,255," + (0.22 - dist / 900) + ")";
            ctx.lineWidth = .9;
            ctx.moveTo(particles[a].x, particles[a].y);
            ctx.lineTo(particles[b].x, particles[b].y);
            ctx.stroke();
          }
        }
      }

      requestAnimationFrame(animateParticles);
    }

    resizeCanvas();
    animateParticles();
  </script>
</body>
</html>
