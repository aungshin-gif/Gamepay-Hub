<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GamePay Hub Digital Store</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,sans-serif;
}

:root{
--purple:#c77dff;
--purple2:#9d4edd;
--card:rgba(40,0,58,.75);
--border:rgba(210,170,255,.2);
}

body{
min-height:100vh;
color:white;
text-align:center;

background:
radial-gradient(circle at top,
#b366ff 0%,
#7b2cbf 18%,
#5a189a 36%,
#3c096c 56%,
#240046 76%,
#140021 100%);
}

.logo-title{
font-size:42px;
font-weight:800;
margin-top:20px;

color:#ffd60a;

text-shadow:
0 0 10px #ffd60a,
0 0 30px #c77dff,
0 0 60px #9d4edd;
}

.logo-sub{
font-size:16px;
margin-bottom:20px;
}

.search-wrap{
width:90%;
max-width:650px;
margin:auto;
}

#searchInput{

width:100%;
padding:18px;

border-radius:20px;
border:2px solid #c77dff;

background:rgba(255,255,255,.08);
color:white;

font-size:16px;

box-shadow:
0 0 10px #c77dff,
0 0 25px #9d4edd;
}

.categories{

display:flex;
flex-wrap:wrap;
justify-content:center;

gap:10px;
margin:25px;
}

.category-btn{

padding:10px 18px;

border-radius:20px;
border:1px solid #c77dff;

background:rgba(255,255,255,.08);

color:white;
cursor:pointer;

}

.category-btn:hover{
background:#9d4edd;
transform:scale(1.05);
}

.apps{

width:95%;
max-width:1200px;

margin:auto;

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(200px,1fr));

gap:18px;

padding:18px;
}

.card{

position:relative;

background:var(--card);

border:1px solid var(--border);

border-radius:20px;

padding:22px;

cursor:pointer;

transition:.25s;

backdrop-filter:blur(10px);
}

.card:hover{

transform:translateY(-8px);

box-shadow:
0 0 20px #c77dff,
0 0 40px #9d4edd;
}

.card img{
width:64px;
height:64px;
margin-bottom:10px;
}

.emoji-icon{
font-size:40px;
margin-bottom:10px;
}

.badge{
position:absolute;
top:10px;
right:10px;
font-size:11px;
padding:4px 10px;
border-radius:999px;
}

.available{
background:#003f1f;
color:#91ffbf;
}

.low{
background:#3f3000;
color:#ffe773;
}

.pricebox{

display:none;

width:92%;
max-width:700px;

margin:30px auto;

background:rgba(37,0,58,.9);

padding:25px;

border-radius:20px;

border:1px solid #9d4edd;

box-shadow:0 0 30px #9d4edd;
}

.qty-control{

display:flex;
justify-content:center;
align-items:center;

gap:15px;
margin-top:15px;
}

.qty-control button{

width:40px;
height:40px;

font-size:20px;
border-radius:10px;
}

button{

padding:12px 22px;

background:#9d4edd;

border:none;
color:white;

border-radius:12px;

cursor:pointer;

font-weight:bold;
}

button:hover{
background:#c77dff;
transform:scale(1.05);
}

.payment-select{

width:100%;
padding:12px;
margin-top:10px;

border-radius:12px;

background:rgba(60,40,0,0.6);
border:1px solid #ffd60a;

color:white;
}

.order-preview{
margin-top:15px;
font-size:14px;
}

</style>
</head>

<body>

<div class="logo-title">🎮 GamePay Hub</div>
<div class="logo-sub">Digital Products Store</div>

<div class="search-wrap">
<input type="text" id="searchInput" placeholder="Search apps..." onkeyup="filterApps()">
</div>

<div class="categories">

<button class="category-btn" onclick="filterCategory('all')">All</button>
<button class="category-btn" onclick="filterCategory('ai')">AI</button>
<button class="category-btn" onclick="filterCategory('editing')">Editing</button>
<button class="category-btn" onclick="filterCategory('music')">Music</button>
<button class="category-btn" onclick="filterCategory('video')">Video</button>
<button class="category-btn" onclick="filterCategory('social')">Social</button>
<button class="category-btn" onclick="filterCategory('services')">Services</button>
<button class="category-btn" onclick="filterCategory('vpn')">VPN</button>
<button class="category-btn" onclick="filterCategory('gift')">Gift</button>

</div>

<div id="appsGrid" class="apps"></div>
<script>

const TELEGRAM_USERNAME="angsthtun"

let qty=1

const products=[

{
id:"chatgpt",
category:"ai",
name:"ChatGPT",
subtitle:"Tap to see prices",
badge:"available",
iconType:"emoji",
icon:"🤖",
search:"chatgpt ai openai",
plans:[
"ChatGPT Plus - 1 Month - 6000 Ks",
"ChatGPT Plus - 3 Months - 8000 Ks"
]
},

{
id:"spotify",
category:"music",
name:"Spotify",
subtitle:"Tap to see prices",
badge:"available",
iconType:"emoji",
icon:"🎵",
search:"spotify music",
plans:[
"1 Month - 8000 Ks",
"3 Months - 24000 Ks"
]
},

{
id:"capcut",
category:"editing",
name:"CapCut Pro",
subtitle:"Tap to see prices",
badge:"available",
iconType:"emoji",
icon:"🎬",
search:"capcut edit video",
plans:[
"1 Month - 6500 Ks",
"3 Months - 19500 Ks"
]
},

{
id:"expressvpn",
category:"vpn",
name:"Express VPN",
subtitle:"Tap to see prices",
badge:"available",
iconType:"emoji",
icon:"🛡️",
search:"vpn secure",
plans:[
"1 Month - 1500 Ks",
"Private - 8000 Ks"
]
},

{
id:"itunes",
category:"gift",
name:"iTunes Gift Card",
subtitle:"Tap to see prices",
badge:"available",
iconType:"emoji",
icon:"🍎",
search:"itunes apple gift",
plans:[
"5 USD - 21500 Ks",
"10 USD - 41500 Ks"
]
}

]
const appsGrid=document.getElementById("appsGrid")
const modal=document.getElementById("productModal")

function createCard(p){

const icon=p.iconType==="image"
? `<img src="${p.icon}">`
: `<div class="emoji-icon">${p.icon}</div>`

const badge=p.badge==="low"
? `<span class="badge low">Low</span>`
: `<span class="badge available">Available</span>`

return`

<div class="card" onclick="openProduct('${p.id}')">

${badge}

${icon}

<h3>${p.name}</h3>
<p>${p.subtitle}</p>

</div>

`

}

function renderCards(list){
appsGrid.innerHTML=list.map(createCard).join("")
}

function filterCategory(cat){

if(cat==="all"){
renderCards(products)
return
}

renderCards(products.filter(p=>p.category===cat))
}

function filterApps(){

const input=document.getElementById("searchInput").value.toLowerCase()

renderCards(products.filter(p=>

p.name.toLowerCase().includes(input)||
p.search.toLowerCase().includes(input)

))
}

function openProduct(id){

qty=1

const p=products.find(x=>x.id===id)
if(!p)return

const options=p.plans.map(x=>`<option>${x}</option>`).join("")

modal.innerHTML=

`

<button onclick="goBack()">⬅ Back</button>

<h3>${p.name}</h3>

<select id="plan" onchange="updatePreview('${p.name}')">

${options}

</select>

<div class="qty-control">

<button onclick="changeQty(-1)">-</button>
<span id="qty">1</span>
<button onclick="changeQty(1)">+</button>

</div>

<div style="margin-top:15px;text-align:left">

Payment Method

<select id="paymentMethod" class="payment-select">

<option>KBZ Pay</option>
<option>Wave Pay</option>
<option>AYA Pay</option>
<option>UAB Pay</option>
<option>Binance Pay</option>

</select>

</div>

<div class="order-preview" id="preview"></div>

<button onclick="sendOrder('${p.name}')">
Order via Telegram
</button>

`

appsGrid.style.display="none"
modal.style.display="block"

updatePreview(p.name)

}

function goBack(){

modal.style.display="none"
appsGrid.style.display="grid"

}

function changeQty(v){

qty+=v

if(qty<1)qty=1

document.getElementById("qty").innerText=qty

updatePreview()

}

function updatePreview(name){

const plan=document.getElementById("plan").value

const priceMatch=plan.match(/(\d+)/)

let price=priceMatch?parseInt(priceMatch[1]):0

let total=price*qty

document.getElementById("preview").innerHTML=

`
Product: ${name}<br>
Plan: ${plan}<br>
Quantity: ${qty}<br>
Total: ${total} Ks
`

}

function sendOrder(name){

const plan=document.getElementById("plan").value
const payment=document.getElementById("paymentMethod").value

const msg=

`Hello, I want to order
Product: ${name}
Plan: ${plan}
Quantity: ${qty}
Payment: ${payment}`

window.open(
"https://t.me/"+TELEGRAM_USERNAME+
"?text="+encodeURIComponent(msg)
)

}

renderCards(products)

</script>
</body>
</html>


<div id="productModal" class="pricebox"></div>
