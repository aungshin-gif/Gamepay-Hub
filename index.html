<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gamepay Hub - Digital Products Store</title>

  <style>
    :root{
      --bg1:#12001f;
      --bg2:#2a0050;
      --bg3:#4b008f;
      --bg4:#8b2cff;

      --text:#ffffff;
      --muted:rgba(255,255,255,.72);

      --glass:rgba(255,255,255,.08);
      --glass-2:rgba(255,255,255,.05);
      --border:rgba(255,255,255,.14);

      --neon:#c86bff;
      --neon-2:#9d4dff;
      --neon-3:#f06bff;

      --good:#8dffb5;
      --shadow:0 0 25px rgba(200,107,255,.28);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      width:100%;
      max-width:100%;
      overflow-x:hidden;
    }

    body{
      font-family:Arial,Helvetica,sans-serif;
      color:var(--text);
      min-height:100vh;
      text-align:center;
      overflow-x:hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.10) 0%, transparent 18%),
        radial-gradient(circle at 80% 30%, rgba(199,125,255,0.18) 0%, transparent 20%),
        radial-gradient(circle at 50% 80%, rgba(0,224,255,0.10) 0%, transparent 22%),
        linear-gradient(135deg,#1a002d 0%,#2b0052 26%,#4b008f 58%,#6d1bc0 78%,#a84dff 100%);
      background-size:200% 200%;
      animation:bgMove 40s linear infinite;
      transform:translateZ(0);
      will-change:transform;
    }

    @keyframes bgMove{
      0%{background-position:0% 50%}
      50%{background-position:100% 50%}
      100%{background-position:0% 50%}
    }

    #particles{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      z-index:0;
      pointer-events:none;
      opacity:.9;
      transform:translateZ(0);
    }

    .page{
      position:relative;
      z-index:1;
      transform:translateZ(0);
      max-width:1200px;
      margin:0 auto;
      padding:18px 14px 40px;
    }

    .hero{
      padding:16px 10px 10px;
    }

    .logo-title{
      font-size:34px;
      font-weight:800;
      letter-spacing:.5px;
      text-shadow:
        0 0 10px rgba(255,255,255,.25),
        0 0 25px rgba(200,107,255,.45),
        0 0 55px rgba(157,77,255,.35);
    }

    .sublogo{
      margin-top:8px;
      font-size:14px;
      color:var(--muted);
      letter-spacing:.4px;
    }

    .search-wrap{
      width:min(96%,760px);
      margin:18px auto 16px;
      position:relative;
    }

    #searchInput{
      width:100%;
      padding:18px 52px 18px 18px;
      border:none;
      outline:none;
      border-radius:20px;
      background:rgba(255,255,255,0.10);
      color:#fff;
      font-size:16px;
      border:1px solid rgba(255,255,255,0.16);
      box-shadow:
        0 0 18px rgba(199,125,255,0.20),
        0 0 40px rgba(157,78,221,0.14),
        inset 0 0 12px rgba(255,255,255,0.08);
      backdrop-filter:none;
      transition:.25s ease;
    }

    #searchInput:focus{
      box-shadow:
        0 0 24px rgba(199,125,255,0.45),
        0 0 55px rgba(157,78,221,0.28),
        inset 0 0 16px rgba(255,255,255,0.14);
      border:1px solid rgba(199,125,255,.55);
    }

    .search-icon{
      position:absolute;
      right:16px;
      top:50%;
      transform:translateY(-50%);
      opacity:.76;
      pointer-events:none;
    }

    .category-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
      margin:8px 0 18px;
      padding:0 4px;
    }

    .cat-btn{
      padding:10px 16px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.08);
      color:#fff;
      font-size:13px;
      cursor:pointer;
      transition:.22s ease;
      box-shadow:0 0 10px rgba(200,107,255,.10);
    }

    .cat-btn:hover,
    .cat-btn.active{
      transform:translateY(-2px);
      background:linear-gradient(135deg, rgba(141,53,255,.35), rgba(224,120,255,.25));
      box-shadow:
        0 0 16px rgba(200,107,255,.30),
        0 0 35px rgba(157,77,255,.18);
      border-color:rgba(255,255,255,.24);
    }

    .products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
      gap:16px;
      padding:8px 0 10px;
    }

    .card{
      position:relative;
      background:rgba(37,0,58,0.88);
      border:1px solid rgba(199,125,255,0.22);
      padding:18px 12px 16px;
      border-radius:22px;
      cursor:pointer;
      transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
      transform:translateZ(0);
      will-change:transform;
      box-shadow:
        0 10px 30px rgba(0,0,0,.22),
        0 0 16px rgba(157,77,255,.12);
      min-height:200px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
    }

    .card:hover{
      transform:translateY(-7px) scale(1.03);
      box-shadow:
        0 18px 40px rgba(0,0,0,.30),
        0 0 24px rgba(200,107,255,.28),
        0 0 60px rgba(157,77,255,.16);
      border-color:rgba(230,180,255,.34);
    }

    .card img{
      width:74px;
      height:74px;
      object-fit:cover;
      border-radius:50%;
      background:#fff;
      padding:7px;
      transition:transform .25s ease, filter .25s ease;
      box-shadow:0 0 14px rgba(255,255,255,.08);
    }

    .card:hover img{
      transform:scale(1.07);
      filter:drop-shadow(0 0 14px rgba(200,107,255,.55));
    }

    .card-name{
      margin-top:12px;
      font-size:17px;
      font-weight:700;
    }

    .card-sub{
      margin-top:7px;
      color:var(--muted);
      font-size:12px;
    }

    .badge{
      position:absolute;
      top:12px;
      right:12px;
      font-size:11px;
      padding:5px 10px;
      border-radius:999px;
      background:rgba(141,255,181,.12);
      color:#baffcb;
      border:1px solid rgba(141,255,181,.22);
    }

    .popup{
      position:fixed;
      inset:0;
      background:rgba(8,0,18,.74);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:999;
      padding:18px;
    }

    .popup-box{
      width:100%;
      max-width:470px;
      max-height:90vh;
      overflow:auto;
      border-radius:24px;
      background:linear-gradient(180deg, rgba(34,0,58,.96), rgba(17,0,33,.98));
      border:1px solid rgba(255,255,255,.14);
      box-shadow:
        0 30px 80px rgba(0,0,0,.45),
        0 0 40px rgba(200,107,255,.18);
      padding:22px 18px 18px;
      text-align:left;
    }

    .popup-head{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:16px;
    }

    .popup-icon{
      width:62px;
      height:62px;
      border-radius:50%;
      background:#fff;
      padding:7px;
      object-fit:cover;
      flex-shrink:0;
    }

    .popup-title{
      font-size:24px;
      font-weight:800;
      line-height:1.1;
    }

    .popup-sub{
      margin-top:4px;
      color:var(--muted);
      font-size:13px;
    }

    .section-label{
      margin:14px 0 10px;
      font-size:13px;
      color:#eed0ff;
      letter-spacing:.3px;
      font-weight:700;
      text-transform:uppercase;
    }

    .plans{
      display:grid;
      gap:10px;
    }

    .plan{
      border:1px solid rgba(255,255,255,.12);
      border-radius:16px;
      background:rgba(255,255,255,.05);
      padding:13px 14px;
      cursor:pointer;
      transition:.22s ease;
      box-shadow:0 0 10px rgba(200,107,255,.06);
    }

    .plan:hover{
      transform:translateY(-2px);
      border-color:rgba(255,255,255,.22);
      box-shadow:
        0 0 18px rgba(200,107,255,.18),
        0 0 36px rgba(157,77,255,.12);
    }

    .plan.active{
      border-color:rgba(235,180,255,.42);
      background:linear-gradient(135deg, rgba(141,53,255,.20), rgba(240,107,255,.12));
      box-shadow:
        0 0 16px rgba(200,107,255,.24),
        0 0 38px rgba(157,77,255,.18);
    }

    .plan-main{
      font-size:14px;
      font-weight:700;
      line-height:1.35;
    }

    .qty-row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:14px;
    }

    .field-box{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.12);
      border-radius:16px;
      padding:12px;
    }

    .field-box label{
      display:block;
      margin-bottom:8px;
      font-size:12px;
      color:#eed0ff;
      font-weight:700;
    }

    .qty-wrap{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
    }

    .qty-btn{
      width:36px;
      height:36px;
      border:none;
      border-radius:12px;
      background:rgba(255,255,255,.08);
      color:#fff;
      font-size:18px;
      cursor:pointer;
      box-shadow:0 0 10px rgba(200,107,255,.10);
    }

    #qty{
      width:100%;
      text-align:center;
      background:transparent;
      border:none;
      outline:none;
      color:#fff;
      font-size:18px;
      font-weight:700;
    }

    .pay-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:10px;
      margin-top:8px;
    }

    .pay-item{
      padding:12px 10px;
      text-align:center;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.05);
      cursor:pointer;
      transition:.22s ease;
      font-size:13px;
      font-weight:700;
      box-shadow:0 0 10px rgba(200,107,255,.06);
    }

    .pay-item:hover,
    .pay-item.active{
      background:linear-gradient(135deg, rgba(141,53,255,.22), rgba(240,107,255,.14));
      border-color:rgba(235,180,255,.40);
      box-shadow:
        0 0 16px rgba(200,107,255,.24),
        0 0 32px rgba(157,77,255,.14);
    }

    .note-box{
      margin-top:14px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(235,180,255,.22);
      border-radius:18px;
      padding:12px;
      box-shadow:
        0 0 16px rgba(200,107,255,.14),
        inset 0 0 16px rgba(255,255,255,.03);
    }

    .note-box label{
      display:block;
      margin-bottom:8px;
      font-size:12px;
      color:#f2d8ff;
      font-weight:700;
    }

    #noteInput{
      width:100%;
      min-height:88px;
      resize:none;
      background:transparent;
      border:none;
      outline:none;
      color:#fff;
      font-size:14px;
      line-height:1.45;
    }

    .preview{
      margin-top:14px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.12);
      border-radius:18px;
      padding:14px;
      box-shadow:0 0 12px rgba(200,107,255,.08);
    }

    .preview-title{
      font-size:13px;
      font-weight:800;
      color:#eed0ff;
      margin-bottom:10px;
      text-transform:uppercase;
    }

    .preview-row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin:8px 0;
      font-size:14px;
    }

    .preview-row .left{
      color:var(--muted);
    }

    .preview-row .right{
      text-align:right;
      font-weight:700;
      word-break:break-word;
    }

    .total-row{
      margin-top:12px;
      padding-top:12px;
      border-top:1px solid rgba(255,255,255,.10);
      display:flex;
      justify-content:space-between;
      font-size:16px;
      font-weight:800;
    }

    .action-row{
      display:flex;
      gap:10px;
      margin-top:16px;
    }

    .btn{
      border:none;
      outline:none;
      cursor:pointer;
      border-radius:16px;
      padding:15px 16px;
      font-size:15px;
      font-weight:800;
      transition:.22s ease;
    }

    .btn-close{
      flex:1;
      background:rgba(255,255,255,.08);
      color:#fff;
      border:1px solid rgba(255,255,255,.14);
    }

    .btn-order{
      flex:2;
      color:#fff;
      background:linear-gradient(135deg,#8d35ff,#d85bff);
      box-shadow:
        0 0 14px rgba(200,107,255,.42),
        0 0 36px rgba(157,77,255,.28);
      position:relative;
      overflow:hidden;
    }

    .btn-order::before{
      content:"";
      position:absolute;
      inset:-30%;
      background:linear-gradient(120deg,transparent,rgba(255,255,255,.28),transparent);
      transform:translateX(-120%) rotate(22deg);
      animation:btnSweep 3.3s linear infinite;
    }

    @keyframes btnSweep{
      0%{transform:translateX(-120%) rotate(22deg)}
      100%{transform:translateX(140%) rotate(22deg)}
    }

    .btn:hover{
      transform:translateY(-2px);
    }

    .small-note{
      margin-top:10px;
      text-align:center;
      font-size:12px;
      color:rgba(255,255,255,.68);
    }

    @media (max-width:700px){
      .logo-title{font-size:29px}
      .products{grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
      .card{min-height:190px}
      .pay-grid{grid-template-columns:repeat(2,1fr)}
      .qty-row{grid-template-columns:1fr}
      .popup-box{padding:18px 14px 14px}
      .popup-title{font-size:21px}
    }

    @media (max-width:430px){
      .products{grid-template-columns:repeat(2,minmax(0,1fr));}
      .card img{width:62px;height:62px}
      .card-name{font-size:15px}
      .popup{padding:10px}
      .pay-grid{grid-template-columns:repeat(2,1fr)}
      .action-row{flex-direction:column}
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>

  <div class="page">
    <div class="hero">
      <div class="logo-title">Gamepay Hub</div>
      <div class="sublogo">Digital Products Store</div>
    </div>

    <div class="search-wrap">
      <input id="searchInput" type="text" placeholder="Search products..." />
      <div class="search-icon">🔍</div>
    </div>

    <div class="category-row" id="categoryRow"></div>

    <div class="products" id="products"></div>
  </div>

  <div class="popup" id="popup">
    <div class="popup-box">
      <div class="popup-head">
        <img id="popupIcon" class="popup-icon" src="" alt="">
        <div>
          <div id="popupTitle" class="popup-title"></div>
          <div id="popupSub" class="popup-sub">Tap to choose your plan</div>
        </div>
      </div>

      <div class="section-label">Plans</div>
      <div class="plans" id="plansWrap"></div>

      <div class="qty-row">
        <div class="field-box">
          <label>Quantity</label>
          <div class="qty-wrap">
            <button class="qty-btn" id="minusBtn">−</button>
            <input id="qty" type="text" value="1" readonly>
            <button class="qty-btn" id="plusBtn">+</button>
          </div>
        </div>

        <div class="field-box">
          <label>Payment Method</label>
          <div class="pay-grid" id="paymentWrap"></div>
        </div>
      </div>

      <div class="note-box">
        <label>Note (Optional)</label>
        <textarea id="noteInput" placeholder="Write your note here..."></textarea>
      </div>

      <div class="preview">
        <div class="preview-title">Order Preview</div>

        <div class="preview-row">
          <div class="left">Product</div>
          <div class="right" id="previewProduct">-</div>
        </div>

        <div class="preview-row">
          <div class="left">Plan</div>
          <div class="right" id="previewPlan">-</div>
        </div>

        <div class="preview-row">
          <div class="left">Quantity</div>
          <div class="right" id="previewQty">1</div>
        </div>

        <div class="preview-row">
          <div class="left">Amount</div>
          <div class="right" id="previewAmount">0 Ks</div>
        </div>

        <div class="preview-row">
          <div class="left">Payment</div>
          <div class="right" id="previewPayment">-</div>
        </div>

        <div class="preview-row">
          <div class="left">Note</div>
          <div class="right" id="previewNote">-</div>
        </div>

        <div class="total-row">
          <div>Total</div>
          <div id="previewTotal">0 Ks</div>
        </div>
      </div>

      <div class="action-row">
        <button class="btn btn-close" id="closeBtn">Close</button>
        <button class="btn btn-order" id="orderBtn">Order via Telegram</button>
      </div>

      <div class="small-note">Telegram chat will open with your order message ready.</div>
    </div>
  </div>

  <script>
    const TELEGRAM_USERNAME = "angsthtun";
<footer class="site-footer">
Founder & CEO — Diameter Eight
</footer>
    const paymentMethods = [
      "KPay",
      "Wave",
      "UAB",
      "AYA",
      "Binance",
      "UAB"
    ];

    const productsData = [
      {
        id: "chatgpt",
        category: "AI",
        name: "ChatGPT",
        subtitle: "Tap to see prices",
        badge: "available",
        icon: "ChatGPT_logo.svg.png",
        search: "chatgpt openai ai",
        plans: [
          ["ChatGPT Plus - 1 Month - 6000 Ks (Share)", 6000],
          ["ChatGPT Plus - 1 Month - 6500 Ks (Private)", 6500],
          ["ChatGPT Plus - 3 Months - 10000 Ks (Share)", 10000],
          ["ChatGPT Plus - 3 Months - 12000 Ks (Private)", 12000],
          ["ChatGPT Business - 1 Month - 6000 Ks (Share)", 6000],
          ["ChatGPT Business - 12 Months - 22000 Ks (Share)", 22000],
          ["ChatGPT Business - 12 Months - 23000 Ks (Private)", 23000]
        ]
      },
      {
        id: "spotify",
        category: "Music",
        name: "Spotify",
        subtitle: "Tap to see prices",
        badge: "available",
        icon: "https://upload.wikimedia.org/wikipedia/commons/1/19/Spotify_logo_without_text.svg",
        search: "spotify music premium",
        plans: [
          ["Family Plan (Global) – 1 Month – 8000 Ks", 8000],
          ["Family Plan (Global) – 2 Months – 12000 Ks", 12000],
          ["Family Plan (Global) – 3 Months – 24000 Ks", 24000],
          ["Family Plan (Global) – 6 Months – 65000 Ks", 65000],
          ["Individual Plan (Global) – 1 Month – 13000 Ks", 13000],
          ["Individual Plan (Global) – 2 Months – 24000 Ks", 24000],
          ["Individual Plan (Global) – 3 Months – 34000 Ks", 34000]
        ]
      }
    ];

    const categories = ["All", "AI", "Editing", "VPN", "Gift", "Music", "Video", "Social", "Services"];

    const productsEl = document.getElementById("products");
    const categoryRowEl = document.getElementById("categoryRow");
    const searchInputEl = document.getElementById("searchInput");

    const popupEl = document.getElementById("popup");
    const popupIconEl = document.getElementById("popupIcon");
    const popupTitleEl = document.getElementById("popupTitle");
    const plansWrapEl = document.getElementById("plansWrap");
    const paymentWrapEl = document.getElementById("paymentWrap");
    const qtyEl = document.getElementById("qty");
    const noteInputEl = document.getElementById("noteInput");

    const previewProductEl = document.getElementById("previewProduct");
    const previewPlanEl = document.getElementById("previewPlan");
    const previewQtyEl = document.getElementById("previewQty");
    const previewAmountEl = document.getElementById("previewAmount");
    const previewPaymentEl = document.getElementById("previewPayment");
    const previewNoteEl = document.getElementById("previewNote");
    const previewTotalEl = document.getElementById("previewTotal");

    let activeCategory = "All";
    let currentProduct = null;
    let currentPlan = null;
    let currentQty = 1;
    let currentPayment = "";

    function renderCategories(){
      categoryRowEl.innerHTML = "";
      categories.forEach(cat => {
        const btn = document.createElement("button");
        btn.className = "cat-btn" + (activeCategory === cat ? " active" : "");
        btn.textContent = cat;
        btn.onclick = () => {
          activeCategory = cat;
          renderCategories();
          renderProducts();
        };
        categoryRowEl.appendChild(btn);
      });
    }

    function renderProducts(){
      const q = searchInputEl.value.trim().toLowerCase();

      const list = productsData.filter(item => {
        const categoryOk = activeCategory === "All" || item.category === activeCategory;
        const searchOk =
          !q ||
          item.name.toLowerCase().includes(q) ||
          item.search.toLowerCase().includes(q) ||
          item.category.toLowerCase().includes(q);
        return categoryOk && searchOk;
      });

      productsEl.innerHTML = "";

      list.forEach(item => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="badge">${item.badge}</div>
          <img src="${item.icon}" alt="${item.name}">
          <div class="card-name">${item.name}</div>
          <div class="card-sub">${item.subtitle}</div>
        `;
        card.onclick = () => openProduct(item);
        productsEl.appendChild(card);
      });
    }

    function openProduct(product){
      currentProduct = product;
      currentPlan = null;
      currentQty = 1;
      currentPayment = "";
      qtyEl.value = "1";
      noteInputEl.value = "";

      popupIconEl.src = product.icon;
      popupTitleEl.textContent = product.name;
      plansWrapEl.innerHTML = "";
      paymentWrapEl.innerHTML = "";

      product.plans.forEach(plan => {
        const item = document.createElement("div");
        item.className = "plan";
        item.innerHTML = `<div class="plan-main">${plan[0]}</div>`;
        item.onclick = () => {
          currentPlan = plan;
          [...plansWrapEl.children].forEach(el => el.classList.remove("active"));
          item.classList.add("active");
          updatePreview();
        };
        plansWrapEl.appendChild(item);
      });

      paymentMethods.forEach(method => {
        const pay = document.createElement("div");
        pay.className = "pay-item";
        pay.textContent = method;
        pay.onclick = () => {
          currentPayment = method;
          [...paymentWrapEl.children].forEach(el => el.classList.remove("active"));
          pay.classList.add("active");
          updatePreview();
        };
        paymentWrapEl.appendChild(pay);
      });

      updatePreview();
      popupEl.style.display = "flex";
    }

    function updatePreview(){
      const amount = currentPlan ? currentPlan[1] : 0;
      const total = amount * currentQty;

      previewProductEl.textContent = currentProduct ? currentProduct.name : "-";
      previewPlanEl.textContent = currentPlan ? currentPlan[0] : "-";
      previewQtyEl.textContent = currentQty;
      previewAmountEl.textContent = amount ? amount.toLocaleString() + " Ks" : "0 Ks";
      previewPaymentEl.textContent = currentPayment || "-";
      previewNoteEl.textContent = noteInputEl.value.trim() || "-";
      previewTotalEl.textContent = total.toLocaleString() + " Ks";
    }

    document.getElementById("minusBtn").onclick = () => {
      if(currentQty > 1){
        currentQty--;
        qtyEl.value = currentQty;
        updatePreview();
      }
    };

    document.getElementById("plusBtn").onclick = () => {
      currentQty++;
      qtyEl.value = currentQty;
      updatePreview();
    };

    noteInputEl.addEventListener("input", updatePreview);

    document.getElementById("closeBtn").onclick = () => {
      popupEl.style.display = "none";
    };

    popupEl.addEventListener("click", (e) => {
      if(e.target === popupEl){
        popupEl.style.display = "none";
      }
    });

    function sendOrder(){
      if(!currentProduct){
        return;
      }

      if(!currentPlan){
        alert("Please select a plan.");
        return;
      }

      if(!currentPayment){
        alert("Please select a payment method.");
        return;
      }

      const total = currentPlan[1] * currentQty;
      const note = noteInputEl.value.trim();

      let msg = "Gamepay Hub\n";
      msg += "Digital order\n\n";
      msg += "💌Product name: " + currentProduct.name + "\n";
      msg += "📄Plan: " + currentPlan[0] + "\n";
      msg += "🔢Quantity: " + currentQty + "\n";
      msg += "💳Payment method: " + currentPayment + "\n";
      msg += "🧾Total: " + total.toLocaleString() + " Ks\n";
      if(note){
        msg += "📝Note: " + note + "\n";
      }

      const telegramURL =
        "https://t.me/" + TELEGRAM_USERNAME + "?text=" + encodeURIComponent(msg);

      popupEl.style.display = "none";

      const isTelegram = /Telegram/i.test(navigator.userAgent);
      if(isTelegram){
        window.location.href = telegramURL;
      }else{
        window.open(telegramURL, "_blank");
      }
    }

    document.getElementById("orderBtn").onclick = sendOrder;

    searchInputEl.addEventListener("input", renderProducts);

    renderCategories();
    renderProducts();

    /* particles */
    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");
    let particles = [];
    let mouse = { x: null, y: null, radius: 120 };

    function resizeCanvas(){
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      initParticles();
    }

    window.addEventListener("resize", resizeCanvas);

    window.addEventListener("mousemove", (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    window.addEventListener("touchmove", (e) => {
      if(e.touches.length){
        mouse.x = e.touches[0].clientX;
        mouse.y = e.touches[0].clientY;
      }
    }, { passive:true });

    function initParticles(){
      particles = [];
      const count = Math.min(90, Math.floor(window.innerWidth / 18));
      for(let i=0;i<count;i++){
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          vx: (Math.random() - .5) * .35,
          vy: (Math.random() - .5) * .35,
          size: Math.random() * 1.8 + .8,
          a: Math.random() * .45 + .18
        });
      }
    }

    function drawParticles(){
      ctx.clearRect(0,0,canvas.width,canvas.height);

      for(let i=0;i<particles.length;i++){
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;

        if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if(p.y < 0 || p.y > canvas.height) p.vy *= -1;

        if(mouse.x !== null && mouse.y !== null){
          const dx = p.x - mouse.x;
          const dy = p.y - mouse.y;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if(dist < mouse.radius){
            p.x += dx / 28;
            p.y += dy / 28;
          }
        }

        ctx.beginPath();
        ctx.fillStyle = "rgba(255,210,255," + p.a + ")";
        ctx.shadowBlur = 18;
        ctx.shadowColor = "#b366ff";
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }

      for(let a=0; a<particles.length; a++){
        for(let b=a+1; b<particles.length; b++){
          const dx = particles[a].x - particles[b].x;
          const dy = particles[a].y - particles[b].y;
          const dist = Math.sqrt(dx*dx + dy*dy);

          if(dist < 110){
            const opacity = 0.12 - dist / 1100;
            if(opacity > 0){
              ctx.beginPath();
              ctx.strokeStyle = "rgba(220,180,255," + opacity + ")";
              ctx.lineWidth = 1;
              ctx.moveTo(particles[a].x, particles[a].y);
              ctx.lineTo(particles[b].x, particles[b].y);
              ctx.stroke();
            }
          }
        }
      }

      requestAnimationFrame(drawParticles);
    }

    resizeCanvas();
    drawParticles();
  </script>
</body>
</html>
