<html lang="en">

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    :root{
      --bg1:#12001f;
      --bg2:#240046;
      --bg3:#5a189a;
      --bg4:#a64dff;
      --card:rgba(40, 0, 58, 0.76);
      --card-border:rgba(210,170,255,0.18);
      --purple:#c77dff;
      --purple-2:#9d4edd;
      --yellow:#ffd60a;
      --text:#ffffff;
      --muted:#efe6ff;
      --green:#91ffbf;
      --green-bg:rgba(0,255,136,0.14);
      --gold:#ffe773;
      --gold-bg:rgba(255,214,10,0.14);
    }

    body{
      font-family:Arial, sans-serif;
      color:var(--text);
      min-height:100vh;
      text-align:center;
      overflow-x:hidden;
      background:
        radial-gradient(circle at top, #b366ff 0%, #7b2cbf 18%, #5a189a 36%, #3c096c 56%, #240046 76%, #140021 100%);
      position:relative;
    }

    #particles{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      z-index:0;
      pointer-events:none;
      opacity:.95;
    }

    .page{
      position:relative;
      z-index:1;
    }

    .topbar{
      padding:28px 16px 14px;
    }

    .logo{
      font-size:42px;
      font-weight:800;
      letter-spacing:1px;
      margin-bottom:6px;
      color:var(--yellow);
      text-shadow:
        0 0 5px var(--yellow),
        0 0 10px var(--yellow),
        0 0 18px #f9c74f,
        0 0 20px var(--purple),
        0 0 32px var(--purple-2),
        0 0 46px #7b2cbf;
    }

    .sublogo{
      font-size:15px;
      color:#fff;
      text-shadow:
        0 0 4px #fff,
        0 0 8px var(--purple),
        0 0 16px var(--purple-2);
      margin-bottom:18px;
    }

    .search-wrap{
      width:min(92%, 560px);
      margin:0 auto;
    }

    #searchInput{
      width:100%;
      padding:14px 16px;
      border:none;
      outline:none;
      border-radius:14px;
      background:rgba(255,255,255,0.10);
      color:white;
      font-size:15px;
      box-shadow:0 0 15px rgba(199,125,255,0.35);
      backdrop-filter:blur(8px);
    }

    #searchInput::placeholder{
      color:#e6dcff;
    }

    .apps{
      width:min(95%, 1200px);
      margin:10px auto 24px;
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:18px;
      padding:18px;
    }

    .card{
      position:relative;
      background:var(--card);
      border:1px solid var(--card-border);
      padding:22px 14px 18px;
      border-radius:20px;
      cursor:pointer;
      box-shadow:
        0 0 18px rgba(157,78,221,0.42),
        inset 0 0 0 1px rgba(255,255,255,0.03);
      transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;
      min-height:210px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      backdrop-filter:blur(10px);
    }

    .card:hover{
      transform:translateY(-4px) scale(1.03);
      box-shadow:
        0 0 28px rgba(199,125,255,0.80),
        0 0 50px rgba(157,78,221,0.22);
      border-color:rgba(199,125,255,0.34);
    }

    .card::before{
      content:"";
      position:absolute;
      inset:-40% auto auto -20%;
      width:120px;
      height:220px;
      background:linear-gradient(120deg, transparent, rgba(255,255,255,0.08), transparent);
      transform:rotate(20deg);
      transition:.45s ease;
      opacity:0;
    }

    .card:hover::before{
      left:110%;
      opacity:1;
    }

    .card img{
      width:64px;
      height:64px;
      object-fit:contain;
      margin-bottom:12px;
      filter:drop-shadow(0 0 7px var(--purple));
    }

    .emoji-icon{
      width:64px;
      height:64px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:38px;
      margin-bottom:12px;
      border-radius:16px;
      background:rgba(255,255,255,0.06);
      box-shadow:0 0 10px rgba(199,125,255,0.28);
    }

    .card h3{
      margin:6px 0 8px;
      font-size:18px;
      color:#fff;
      text-shadow:
        0 0 3px #fff,
        0 0 8px var(--purple),
        0 0 14px var(--purple-2);
    }

    .card p{
      margin:0;
      color:var(--muted);
      font-size:14px;
    }

    .badge{
      position:absolute;
      top:12px;
      right:12px;
      font-size:11px;
      padding:5px 10px;
      border-radius:999px;
      font-weight:700;
      letter-spacing:.2px;
    }

    .available{
      background:var(--green-bg);
      color:var(--green);
      border:1px solid rgba(145,255,191,0.25);
      box-shadow:0 0 10px rgba(145,255,191,0.16);
    }

    .low{
      background:var(--gold-bg);
      color:var(--gold);
      border:1px solid rgba(255,231,115,0.25);
      box-shadow:0 0 10px rgba(255,231,115,0.16);
    }

    .pricebox{

      padding:24px 18px 28px;
      border-radius:22px;
      background:rgba(37, 0, 58, 0.86);

        inset 0 0 0 1px rgba(255,255,255,0.03);
      backdrop-filter:blur(12px);
      animation:fade .35s ease;
    }

    @keyframes fade{
      from{opacity:0; transform:translateY(18px);}
      to{opacity:1; transform:translateY(0);}
    }

    .neon{
      color:#fff;
      text-shadow:
        0 0 3px #fff,
        0 0 8px var(--purple),
        0 0 14px var(--purple-2);
    }

    .pricebox h3{
      margin:10px 0 16px;
      font-size:30px;
    }

    .selector-wrap{
      width:min(100%, 560px);
      margin:16px auto 10px;
      text-align:left;
    }

    .selector-label{
      font-size:14px;
      margin-bottom:8px;
      color:#efe6ff;
      text-shadow:0 0 5px var(--purple);
    }

    select{
  width:100%;
  padding:14px 16px;
  border-radius:14px;
  border:1px solid rgba(199,125,255,0.6);
  background:rgba(90,0,140,0.45);
  color:white;
  font-size:15px;

  box-shadow:
  0 0 10px rgba(199,125,255,0.7),
  0 0 20px rgba(157,78,221,0.5),
  inset 0 0 10px rgba(199,125,255,0.2);

  backdrop-filter:blur(12px);
    }

option{
  background:#2a0045;
  color:white;
}

    option{
      color:#000;
    }

    .order-preview{
      width:min(100%, 560px);
      margin:14px auto 0;
      padding:12px 14px;
      border-radius:14px;
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(199,125,255,0.16);
      text-align:left;
      font-size:14px;
      color:#f5ecff;
      box-shadow:0 0 10px rgba(157,78,221,0.18);
      line-height:1.6;
    }

    .order-preview strong{
      color:#fff;
    }

    button{
      background:var(--purple-2);
      color:white;
      border:none;
      padding:11px 22px;
      border-radius:10px;
      margin-top:12px;
      cursor:pointer;
      transition:.25s ease;
      box-shadow:0 0 12px var(--purple-2);
      font-size:15px;
      font-weight:700;
    }

    button:hover{
      background:var(--purple);
      transform:scale(1.05);
      box-shadow:0 0 22px var(--purple);
    }

    .back-btn{
      margin-bottom:8px;
    }

    .action-row{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .footer{
      margin:50px auto 24px;
      padding:18px 16px 28px;
      font-size:14px;
      color:#fff;
      text-shadow:
        0 0 5px #fff,
        0 0 10px var(--purple);
      position:relative;
      z-index:1;
    }

    @media (max-width: 980px){

        grid-template-columns:repeat(3, 1fr);
      }
    }

    @media (max-width: 720px){
      .apps{
        grid-template-columns:repeat(2, 1fr);
        gap:14px;
        padding:14px;
      }

      }

      .pricebox h3{

      }
    }

    @media (max-width: 430px){
      .card{

        padding:18px 10px 15px;
      }

      .card h3{
        font-size:16px;
      }

      .card p{

      }

      .card img,

        width:56px;
        height:56px;
      }

      .emoji-icon{
        font-size:33px;
      }

      .pricebox{
        padding:18px 14px 22px;
      }

      button{
        width:100%;
      }

      .action-row{
        display:block;
      }
    }
  </style>

    const appsGrid = document.getElementById("appsGrid");
    const modal = document.getElementById("productModal");
    const searchInput = document.getElementById("searchInput");

    function createCard(product){
      const badgeClass = product.badge === "low" ? "low" : "available";
      const badgeText = product.badge === "low" ? "Low Stock" : "Available";

      const iconHtml = product.iconType === "image"
        ? `<div class="icon-shell"><img src="${product.icon}" alt="${escapeHtml(product.name)}"></div>`
        : `<div class="icon-shell"><div class="emoji-icon">${product.icon}</div></div>`;

      return `
        <div class="card" data-name="${escapeHtml(product.search)}" onclick="openProduct('${escapeJs(product.id)}')">
          <span class="badge ${badgeClass}">${badgeText}</span>
          ${iconHtml}
          <h3>${escapeHtml(product.name)}</h3>
          <p>${escapeHtml(product.subtitle)}</p>
        </div>
      `;
    }

    function renderCards(list){
      appsGrid.innerHTML = list.map(createCard).join("");
    }

    function openProduct(id){
      const product = products.find(p => p.id === id);
      if(!product) return;

      const options = product.plans.map(plan =>
        `<option value="${escapeHtml(plan)}">${escapeHtml(plan)}</option>`
      ).join("");

      modal.innerHTML = `
        <button class="back-btn" onclick="goBack()">⬅ Back</button>
        <h3>${escapeHtml(product.name)}</h3>

        <div class="selector-wrap">
          <div class="selector-label">Select plan</div>
          <select id="currentPlanSelect" onchange="updatePreview('${escapeJs(product.name)}')">
            ${options}
          </select>
        </div>

        ${product.note ? `<div class="note">${escapeHtml(product.note)}</div>` : ""}

        <div class="order-preview" id="orderPreviewBox"></div>

        <div class="action-row">
          <button onclick="sendOrder('${escapeJs(product.name)}')">Order via Telegram</button>
        </div>
      `;

      appsGrid.style.display = "none";
      modal.style.display = "block";
      updatePreview(product.name);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function goBack(){
      modal.style.display = "none";
      appsGrid.style.display = "grid";
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function filterApps(){
      const value = searchInput.value.toLowerCase().trim();
      const filtered = products.filter(p =>
        p.name.toLowerCase().includes(value) ||
        p.search.toLowerCase().includes(value)
      );
      renderCards(filtered);
    }

    function updatePreview(productName){
      const select = document.getElementById("currentPlanSelect");
      const preview = document.getElementById("orderPreviewBox");
      if(!select || !preview) return;

      preview.innerHTML =
        "<strong>Order Preview</strong><br>" +
        "Product: " + escapeHtml(productName) + "<br>" +
        "Plan: " + escapeHtml(select.value);
    }

    function sendOrder(productName){
      const select = document.getElementById("currentPlanSelect");
      if(!select) return;

      const message =
        "Hello, I want to order\n" +
        "Product: " + productName + "\n" +
        "Plan: " + select.value;

      const url = "https://t.me/" + TELEGRAM_USERNAME + "?text=" + encodeURIComponent(message);
      window.open(url, "_blank");
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#39;");
    }

    function escapeJs(str){
      return String(str)
        .replaceAll("\\","\\\\")
        .replaceAll("'","\\'");
    }

    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");
    let particles = [];

    function resizeCanvas(){
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    function createParticles(){
      particles = [];
      const count = Math.min(90, Math.floor(window.innerWidth / 18));
      for(let i = 0; i < count; i++){
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 2.3 + 0.7,
          dx: (Math.random() - 0.5) * 0.35,
          dy: (Math.random() - 0.5) * 0.35,
          a: Math.random() * 0.55 + 0.18
        });
      }
    }

    function drawParticles(){
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for(let i = 0; i < particles.length; i++){
        const p = particles[i];
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(220,190,255," + p.a + ")";
        ctx.shadowBlur = 16;
        ctx.shadowColor = "#c77dff";
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;

        if(p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if(p.y < 0 || p.y > canvas.height) p.dy *= -1;
      }

      for(let i = 0; i < particles.length; i++){
        for(let j = i + 1; j < particles.length; j++){
          const a = particles[i];
          const b = particles[j];
          const dist = Math.hypot(a.x - b.x, a.y - b.y);
          if(dist < 120){
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = "rgba(199,125,255," + (0.16 - dist / 900) + ")";
            ctx.lineWidth = 1;
            ctx.stroke();
          }
        }
      }

      requestAnimationFrame(drawParticles);
    }

    resizeCanvas();
    createParticles();
    drawParticles();

    window.addEventListener("resize", function(){
      resizeCanvas();
      createParticles();
    });
  </script>
</body>
</html>
