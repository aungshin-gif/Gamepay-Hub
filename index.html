<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />
  <title>Gamepay Hub - Digital Products Store</title>

  <style>
    :root{
      --bg1:#13001f;
      --bg2:#25003f;
      --bg3:#4b0a80;
      --bg4:#8c33db;
      --bg5:#d76dff;

      --text:#ffffff;
      --muted:rgba(255,255,255,.72);

      --glass:rgba(255,255,255,.08);
      --glass2:rgba(255,255,255,.05);
      --border:rgba(255,255,255,.14);

      --neon:#c77dff;
      --neon2:#9d4edd;
      --neon3:#f15cff;
      --cyan:#7df9ff;
      --good:#a6ffcb;
      --danger:#ff9fc9;

      --shadow:0 18px 44px rgba(0,0,0,.36);
      --radius-xl:28px;
      --radius-lg:22px;
      --radius-md:16px;
      --radius-sm:12px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html,body{
      width:100%;
      max-width:100%;
      overflow-x:hidden;
      scroll-behavior:smooth;
    }

    body{
      min-height:100vh;
      font-family:Arial,Helvetica,sans-serif;
      color:var(--text);
      overflow-x:hidden;
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,.10) 0%, transparent 18%),
        radial-gradient(circle at 82% 24%, rgba(199,125,255,.18) 0%, transparent 22%),
        radial-gradient(circle at 50% 82%, rgba(121,242,255,.10) 0%, transparent 22%),
        linear-gradient(135deg,#140022 0%,#25003f 24%,#4b0a80 55%,#8c33db 82%,#d76dff 100%);
      background-size:200% 200%;
      animation:bgMove 40s linear infinite;
      transform:translateZ(0);
      will-change:transform;
    }

    @keyframes bgMove{
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    #particles{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      z-index:0;
      pointer-events:none;
      opacity:.9;
    }

    .page{
      position:relative;
      z-index:1;
      width:min(1220px,94%);
      margin:0 auto;
      padding:18px 0 50px;
    }

    .hero{
      text-align:center;
      padding:10px 0 18px;
    }

    .brand-wrap{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:14px;
      flex-wrap:wrap;
      margin-bottom:8px;
    }

    .brand-orb{
      width:58px;
      height:58px;
      border-radius:50%;
      background:
        radial-gradient(circle at 30% 30%, #fff8c4 0%, #ffd166 12%, #f3c1ff 28%, #c77dff 48%, #7b2cbf 76%, #2d0847 100%);
      box-shadow:
        0 0 18px rgba(255,255,255,.28),
        0 0 28px rgba(199,125,255,.48),
        0 0 54px rgba(123,44,191,.35);
      animation:orbPulse 2.8s ease-in-out infinite alternate;
    }

    @keyframes orbPulse{
      from{transform:scale(1);}
      to{transform:scale(1.08);}
    }

    .hero-title{
      font-size:clamp(32px,5vw,54px);
      font-weight:900;
      letter-spacing:.5px;
      background:linear-gradient(90deg,#fff3b0 0%,#ffd166 20%,#ffffff 46%,#f1c8ff 66%,#c77dff 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      text-shadow:
        0 0 12px rgba(255,255,255,.14),
        0 0 24px rgba(199,125,255,.34),
        0 0 52px rgba(157,78,221,.24);
      line-height:1.1;
    }

    .hero-sub{
      margin-top:6px;
      font-size:14px;
      color:var(--muted);
      letter-spacing:.4px;
    }

    .search-wrap{
      width:min(760px,100%);
      margin:18px auto 14px;
      position:relative;
    }

    .search-wrap input{
      width:100%;
      border:none;
      outline:none;
      border-radius:18px;
      padding:16px 18px 16px 48px;
      color:#fff;
      font-size:15px;
      background:rgba(255,255,255,.09);
      border:1px solid rgba(255,255,255,.16);
      box-shadow:
        0 0 18px rgba(199,125,255,.18),
        inset 0 0 12px rgba(255,255,255,.08);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      transition:.25s ease;
    }

    .search-wrap input:focus{
      border-color:rgba(199,125,255,.42);
      box-shadow:
        0 0 22px rgba(199,125,255,.28),
        0 0 50px rgba(157,78,221,.16),
        inset 0 0 12px rgba(255,255,255,.10);
    }

    .search-wrap input::placeholder{
      color:rgba(255,255,255,.56);
    }

    .search-icon{
      position:absolute;
      left:16px;
      top:50%;
      transform:translateY(-50%);
      pointer-events:none;
      opacity:.82;
      font-size:18px;
    }

    .categories{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
      margin-bottom:22px;
      padding:0 6px;
    }

    .cat{
      padding:10px 16px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      cursor:pointer;
      user-select:none;
      font-size:13px;
      transition:.22s ease;
      box-shadow:0 0 10px rgba(199,125,255,.08);
    }

    .cat:hover,
    .cat.active{
      transform:translateY(-2px);
      background:rgba(199,125,255,.16);
      border-color:rgba(199,125,255,.42);
      box-shadow:0 0 18px rgba(199,125,255,.22);
    }

    .hidden{
      display:none !important;
    }

    .catalog-view{
      width:100%;
    }

    .products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:20px;
      justify-items:center;
      align-items:start;
    }

    .card{
      width:100%;
      max-width:220px;
      position:relative;
      border-radius:22px;
      padding:18px 14px 16px;
      cursor:pointer;
      background:rgba(37,0,58,.88);
      border:1px solid rgba(199,125,255,.18);
      box-shadow:var(--shadow), inset 0 0 0 1px rgba(255,255,255,.02);
      transition:transform .28s ease, box-shadow .28s ease, border-color .28s ease;
      overflow:hidden;
      min-height:230px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg, rgba(255,255,255,.08), transparent 40%, transparent 60%, rgba(199,125,255,.10));
      pointer-events:none;
    }

    .card:hover{
      transform:translateY(-8px) scale(1.02);
      border-color:rgba(199,125,255,.42);
      box-shadow:
        0 16px 42px rgba(0,0,0,.42),
        0 0 30px rgba(199,125,255,.25);
    }

    .icon-wrap{
      width:78px;
      height:78px;
      border-radius:50%;
      margin:0 auto 12px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:10px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:0 0 18px rgba(199,125,255,.18);
      overflow:hidden;
      font-size:34px;
    }

    .card img{
      width:100%;
      height:100%;
      border-radius:50%;
      object-fit:contain;
      transition:transform .28s ease, filter .28s ease;
    }

    .card:hover img{
      transform:scale(1.07);
      filter:drop-shadow(0 0 18px rgba(199,125,255,.55));
    }

    .card-name{
      font-size:16px;
      font-weight:800;
      line-height:1.25;
      text-align:center;
    }

    .card-sub{
      font-size:12px;
      color:var(--muted);
      margin-top:6px;
      text-align:center;
    }

    .card-bottom{
      margin-top:14px;
      text-align:center;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:7px 12px;
      border-radius:999px;
      font-size:12px;
      background:rgba(166,255,203,.10);
      border:1px solid rgba(166,255,203,.20);
      color:#effff5;
      box-shadow:0 0 12px rgba(166,255,203,.08);
    }

    .price-from{
      margin-top:10px;
      font-size:12px;
      color:rgba(255,255,255,.68);
    }
    .order-view{
      width:min(760px,100%);
      margin:0 auto;
    }

    .panel{
      background:rgba(28,0,43,.86);
      border:1px solid rgba(255,255,255,.10);
      border-radius:26px;
      padding:18px;
      box-shadow:var(--shadow), 0 0 30px rgba(199,125,255,.12);
      text-align:left;
    }

    .top-actions{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:10px;
    }

    .back-btn{
      border:none;
      border-radius:14px;
      padding:10px 14px;
      color:#fff;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      cursor:pointer;
      font-weight:700;
    }

    .panel-title{
      text-align:center;
      font-size:22px;
      font-weight:900;
      margin-bottom:6px;
    }

    .panel-sub{
      text-align:center;
      font-size:12px;
      color:var(--muted);
      margin-bottom:14px;
    }

    .field{
      margin-top:16px;
    }

    .field-title{
      font-size:13px;
      font-weight:800;
      margin-bottom:10px;
    }

    .input,
    .note-box{
      width:100%;
      border:none;
      outline:none;
      border-radius:16px;
      padding:13px 14px;
      color:#fff;
      font-size:14px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      box-shadow:
        0 0 18px rgba(199,125,255,.12),
        inset 0 0 10px rgba(255,255,255,.06);
      transition:.22s ease;
    }

    .input:focus,
    .note-box:focus{
      border-color:rgba(199,125,255,.42);
      box-shadow:
        0 0 22px rgba(199,125,255,.20),
        0 0 44px rgba(157,78,221,.10),
        inset 0 0 10px rgba(255,255,255,.08);
    }

    .input::placeholder,
    .note-box::placeholder{
      color:rgba(255,255,255,.52);
    }

    .note-box{
      min-height:96px;
      resize:none;
      line-height:1.55;
    }

    .desc-box{
      min-height:96px;
      resize:none;
      line-height:1.55;
    }

    .cart-item{
      margin-top:14px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:12px;
    }

    .cart-head{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:flex-start;
    }

    .cart-name{
      font-size:16px;
      font-weight:800;
      line-height:1.25;
    }

    .cart-plan-current{
      margin-top:4px;
      font-size:12px;
      color:var(--muted);
      line-height:1.4;
    }

    .remove-btn{
      flex-shrink:0;
      border:none;
      border-radius:10px;
      padding:6px 10px;
      font-size:12px;
      color:#fff;
      background:rgba(255,159,201,.14);
      border:1px solid rgba(255,159,201,.24);
      cursor:pointer;
    }

    .plan-toggle{
      width:100%;
      margin-top:10px;
      border:none;
      border-radius:12px;
      padding:10px;
      background:rgba(255,255,255,.06);
      color:#fff;
      border:1px solid rgba(255,255,255,.10);
      font-size:12px;
      font-weight:700;
      cursor:pointer;
    }

    .plan-list{
      display:grid;
      gap:8px;
      margin-top:10px;
    }

    .plan-option{
      padding:10px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      cursor:pointer;
      font-size:12px;
      line-height:1.45;
      transition:.2s ease;
    }

    .plan-option.active{
      background:rgba(199,125,255,.15);
      border-color:rgba(199,125,255,.42);
      box-shadow:0 0 18px rgba(199,125,255,.18);
    }

    .qty-row{
      margin-top:12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .qty-box{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .qty-btn{
      width:30px;
      height:30px;
      border:none;
      border-radius:50%;
      cursor:pointer;
      color:#fff;
      font-size:16px;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.12);
    }

    .qty-num{
      min-width:26px;
      text-align:center;
      font-size:14px;
      font-weight:800;
    }

    .amount{
      font-size:13px;
      font-weight:800;
    }

    .summary{
      margin-top:16px;
      padding-top:14px;
      border-top:1px solid rgba(255,255,255,.10);
      display:grid;
      gap:10px;
    }

    .line{
      display:flex;
      justify-content:space-between;
      gap:12px;
      font-size:14px;
    }

    .line-total{
      display:flex;
      justify-content:space-between;
      gap:12px;
      font-size:18px;
      font-weight:900;
    }

    .pay-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
    }

    .pay-option{
      border-radius:14px;
      padding:12px 10px;
      text-align:center;
      cursor:pointer;
      font-size:13px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.12);
      transition:.22s ease;
      user-select:none;
    }

    .pay-option.active{
      background:rgba(199,125,255,.17);
      border-color:rgba(199,125,255,.45);
      box-shadow:0 0 18px rgba(199,125,255,.22);
    }

    .telegram-btn{
      position:relative;
      width:100%;
      margin-top:18px;
      border:none;
      border-radius:18px;
      padding:15px 16px;
      color:#fff;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
      overflow:hidden;
      background:linear-gradient(90deg,#7b2cff,#c24dff,#7b2cff);
      background-size:200% 100%;
      animation:btnFlow 3s linear infinite;
      box-shadow:
        0 0 18px rgba(199,125,255,.34),
        0 0 40px rgba(157,78,221,.18);
    }

    .telegram-btn::before{
      content:"";
      position:absolute;
      inset:-45%;
      background:linear-gradient(120deg, transparent, rgba(255,255,255,.28), transparent);
      transform:rotate(25deg);
      animation:btnGlow 3.2s linear infinite;
      pointer-events:none;
    }

    .telegram-btn:disabled{
      opacity:.6;
      cursor:not-allowed;
      box-shadow:none;
      animation:none;
    }

    @keyframes btnFlow{
      0%{background-position:0% 50%;}
      100%{background-position:200% 50%;}
    }

    @keyframes btnGlow{
      0%{transform:translateX(-120%) rotate(25deg);}
      100%{transform:translateX(220%) rotate(25deg);}
    }

    .preview{
      margin-top:16px;
      padding:14px;
      border-radius:18px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
    }

    .preview-title{
      font-size:13px;
      font-weight:800;
      margin-bottom:10px;
    }

    .preview-box{
      white-space:pre-wrap;
      word-break:break-word;
      overflow-wrap:anywhere;
      font-size:12px;
      line-height:1.6;
      color:#f7efff;
      text-align:left;
    }

    .site-footer{
      margin-top:42px;
      text-align:center;
      padding:22px 10px 28px;
      font-size:14px;
      font-weight:700;
      color:#efd6ff;
      border-top:1px solid rgba(199,125,255,.22);
      text-shadow:
        0 0 10px rgba(199,125,255,.55),
        0 0 20px rgba(157,78,221,.35);
    }

    @media (max-width:640px){
      .page{
        width:min(96%,96%);
      }
      .products{
        grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
        gap:16px;
      }
      .card{
        max-width:100%;
        min-height:210px;
      }
      .icon-wrap{
        width:68px;
        height:68px;
        font-size:30px;
      }
    }
  </style>
</head>
<body>
  <canvas id="particles"></canvas>

  <div class="page">
    <div class="hero">
      <div class="brand-wrap">
        <div class="brand-orb"></div>
        <div class="hero-title">Gamepay Hub</div>
      </div>
      <div class="hero-sub">Digital Products Store</div>
    </div>

    <div id="catalogView" class="catalog-view">
      <div class="search-wrap">
        <span class="search-icon">🔎</span>
        <input id="searchInput" type="text" placeholder="Search products..." />
      </div>

      <div class="categories" id="categories"></div>
      <div class="products" id="products"></div>
    </div>

    <div id="orderView" class="order-view hidden">
      <div class="panel">
        <div class="top-actions">
          <button id="backBtn" class="back-btn">← Back to Apps</button>
          <div></div>
        </div>

        <div class="panel-title">Order Cart</div>
        <div class="panel-sub">Best neon glow order system</div>

        <div class="field">
          <div class="field-title">Description</div>
          <textarea id="appDescription" class="note-box desc-box" readonly placeholder="Description will appear here..."></textarea>
        </div>

        <div id="cartItem" class="cart-item hidden">
          <div class="cart-head">
            <div style="min-width:0">
              <div id="cartName" class="cart-name">-</div>
              <div id="cartPlanCurrent" class="cart-plan-current">-</div>
            </div>
            <button id="removeBtn" class="remove-btn">Remove</button>
          </div>

          <button id="togglePlansBtn" class="plan-toggle">Hide Plan Selection</button>
          <div id="planList" class="plan-list"></div>

          <div class="qty-row">
            <div class="qty-box">
              <button id="minusBtn" class="qty-btn">−</button>
              <div id="qtyNum" class="qty-num">1</div>
              <button id="plusBtn" class="qty-btn">+</button>
            </div>
            <div id="itemAmount" class="amount">0 Ks</div>
          </div>
        </div>

        <div class="summary">
          <div class="line"><span>Selected Items</span><span id="sumItems">0</span></div>
          <div class="line"><span>Quantity</span><span id="sumQty">0</span></div>
          <div class="line"><span>Amount</span><span id="sumAmount">0 Ks</span></div>
          <div class="line-total"><span>Total</span><span id="sumTotal">0 Ks</span></div>
        </div>
        <div class="field">
          <div class="field-title">Account / Email / Username</div>
          <input id="accountInput" class="input" type="text" placeholder="Enter account..." />
        </div>

        <div class="field">
          <div class="field-title">Payment Method</div>
          <div class="pay-grid" id="payGrid"></div>
        </div>

        <div class="field">
          <div class="field-title">Note</div>
          <textarea id="noteInput" class="note-box" placeholder="Write note here..."></textarea>
        </div>

        <button id="orderBtn" class="telegram-btn" disabled>Order via Telegram</button>

        <div class="preview">
          <div class="preview-title">Order Preview</div>
          <div id="previewBox" class="preview-box">No order preview yet.</div>
        </div>
      </div>
    </div>

    <footer class="site-footer">
      Founder: Diameter Eight
    </footer>
  </div>

    const paymentMethods = ["KPay","Wave","UAB","AYA","Binance","WeChatPay"];

    let activeCategory = "All";
    let activePayment = "";
    let currentProduct = null;
    let currentPlanIndex = 0;
    let currentQty = 1;
    let plansOpen = true;

    const catalogView = document.getElementById("catalogView");
    const orderView = document.getElementById("orderView");
    const productsEl = document.getElementById("products");
    const categoriesEl = document.getElementById("categories");
    const searchInput = document.getElementById("searchInput");

    const backBtn = document.getElementById("backBtn");
    const removeBtn = document.getElementById("removeBtn");
    const cartItem = document.getElementById("cartItem");
    const cartName = document.getElementById("cartName");
    const cartPlanCurrent = document.getElementById("cartPlanCurrent");
    const togglePlansBtn = document.getElementById("togglePlansBtn");
    const planList = document.getElementById("planList");
    const minusBtn = document.getElementById("minusBtn");
    const plusBtn = document.getElementById("plusBtn");
    const qtyNum = document.getElementById("qtyNum");
    const itemAmount = document.getElementById("itemAmount");

    const appDescription = document.getElementById("appDescription");
    const accountInput = document.getElementById("accountInput");
    const payGrid = document.getElementById("payGrid");
    const noteInput = document.getElementById("noteInput");
    const orderBtn = document.getElementById("orderBtn");
    const previewBox = document.getElementById("previewBox");

    const sumItems = document.getElementById("sumItems");
    const sumQty = document.getElementById("sumQty");
    const sumAmount = document.getElementById("sumAmount");
    const sumTotal = document.getElementById("sumTotal");

    function formatKs(n){
      return `${Number(n).toLocaleString()} Ks`;
    }

    function getCheapestPrice(product){
      return Math.min(...product.plans.map(p => Number(p.price || 0)));
    }

    function renderCategories(){
      categoriesEl.innerHTML = "";
      categories.forEach(cat => {
        const el = document.createElement("div");
        el.className = "cat" + (cat === activeCategory ? " active" : "");
        el.textContent = cat;
        el.onclick = () => {
          activeCategory = cat;
          renderCategories();
          renderProducts();
        };
        categoriesEl.appendChild(el);
      });
    }

    function getFilteredProducts(){
      const q = (searchInput.value || "").trim().toLowerCase();
      return products.filter(product => {
        const byCategory = activeCategory === "All" || product.category === activeCategory;
        const bySearch = !q || `${product.name} ${product.search} ${product.category}`.toLowerCase().includes(q);
        return byCategory && bySearch;
      });
    }

    function renderIcon(product){
      if(product.iconType === "emoji"){
        return product.icon;
      }
      return `<img src="${product.icon}" alt="${product.name}">`;
    }

    function renderProducts(){
      productsEl.innerHTML = "";
      getFilteredProducts().forEach(product => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div>
            <div class="icon-wrap">${renderIcon(product)}</div>
            <div class="card-name">${product.name}</div>
            <div class="card-sub">${product.subtitle}</div>
          </div>
          <div class="card-bottom">
            <div class="badge">${product.badge}</div>
            <div class="price-from">From ${formatKs(getCheapestPrice(product))}</div>
          </div>
        `;
        card.onclick = () => openOrder(product);
        productsEl.appendChild(card);
      });
    }

    function renderPayments(){
      payGrid.innerHTML = "";
      paymentMethods.forEach(method => {
        const el = document.createElement("div");
        el.className = "pay-option" + (activePayment === method ? " active" : "");
        el.textContent = method;
        el.onclick = () => {
          activePayment = method;
          renderPayments();
          updatePreview();
        };
        payGrid.appendChild(el);
      });
    }

    function openOrder(product){
      currentProduct = product;
      currentPlanIndex = 0;
      currentQty = 1;
      plansOpen = true;
      activePayment = "";
      accountInput.value = "";
      noteInput.value = "";
      appDescription.value = product.description || "";

      catalogView.classList.add("hidden");
      orderView.classList.remove("hidden");

      renderOrder();
      renderPayments();
      updatePreview();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function closeOrder(){
      currentProduct = null;
      catalogView.classList.remove("hidden");
      orderView.classList.add("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderOrder(){
      if(!currentProduct){
        cartItem.classList.add("hidden");
        return;
      }

      const selectedPlan = currentProduct.plans[currentPlanIndex];
      const amount = Number(selectedPlan.price) * currentQty;

      cartItem.classList.remove("hidden");
      cartName.textContent = currentProduct.name;
      cartPlanCurrent.textContent = selectedPlan.name;
      qtyNum.textContent = currentQty;
      itemAmount.textContent = formatKs(amount);

      togglePlansBtn.textContent = plansOpen ? "Hide Plan Selection" : "Choose Plan";
      planList.innerHTML = "";

      if(plansOpen){
        currentProduct.plans.forEach((plan, index) => {
          const el = document.createElement("div");
          el.className = "plan-option" + (index === currentPlanIndex ? " active" : "");
          el.textContent = plan.name;
          el.onclick = () => {
            currentPlanIndex = index;
            renderOrder();
            updatePreview();
          };
          planList.appendChild(el);
        });
      }

      sumItems.textContent = "1";
      sumQty.textContent = currentQty;
      sumAmount.textContent = formatKs(amount);
      sumTotal.textContent = formatKs(amount);
    }

    function buildTelegramMessage(){
      if(!currentProduct) return "";

      const selectedPlan = currentProduct.plans[currentPlanIndex];
      const total = Number(selectedPlan.price) * currentQty;

      let msg = "Gamepay Hub\n";
      msg += "Digital order\n\n";
      msg += `💌Product name: ${currentProduct.name}\n`;
      msg += `📄Plan: ${selectedPlan.name}\n`;
      msg += `💳Payment method: ${activePayment || "Not selected"}\n`;
      msg += `🧾Total: ${formatKs(total)}\n`;

      const note = noteInput.value.trim();
      if(note){
        msg += `📝Note: ${note}\n`;
      }

      const account = accountInput.value.trim();
      if(account){
        msg += `👤Account: ${account}\n`;
      }

      return msg.trim();
    }

    function updatePreview(){
      const preview = buildTelegramMessage();
      previewBox.textContent = preview || "No order preview yet.";
      orderBtn.disabled = !(currentProduct && activePayment);
    }

    function openTelegramOrder(){
      if(!currentProduct || !activePayment) return;
      const message = buildTelegramMessage();
      const telegramURL = "https://t.me/" + TELEGRAM_USERNAME + "?text=" + encodeURIComponent(message);
      window.location.href = telegramURL;
    }

    searchInput.addEventListener("input", renderProducts);
    backBtn.addEventListener("click", closeOrder);
    removeBtn.addEventListener("click", closeOrder);
    togglePlansBtn.addEventListener("click", () => {
      plansOpen = !plansOpen;
      renderOrder();
    });
    minusBtn.addEventListener("click", () => {
      currentQty = Math.max(1, currentQty - 1);
      renderOrder();
      updatePreview();
    });
    plusBtn.addEventListener("click", () => {
      currentQty += 1;
      renderOrder();
      updatePreview();
    });
    accountInput.addEventListener("input", updatePreview);
    noteInput.addEventListener("input", updatePreview);
    orderBtn.addEventListener("click", openTelegramOrder);

    renderCategories();
    renderProducts();
    renderPayments();

    const canvas = document.getElementById("particles");
    const ctx = canvas.getContext("2d");
    let particles = [];
    let mouse = { x:null, y:null, radius:120 };

    function resizeCanvas(){
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      initParticles();
    }

    function initParticles(){
      particles = [];
      const count = Math.min(110, Math.max(60, Math.floor(window.innerWidth / 15)));
      for(let i = 0; i < count; i++){
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          size: Math.random() * 1.8 + .9,
          vx: (Math.random() - .5) * .35,
          vy: (Math.random() - .5) * .35,
          a: Math.random() * .45 + .18
        });
      }
    }

    window.addEventListener("resize", resizeCanvas);

    window.addEventListener("mousemove", e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
    });

    window.addEventListener("touchmove", e => {
      if(e.touches.length){
        mouse.x = e.touches[0].clientX;
        mouse.y = e.touches[0].clientY;
      }
    }, { passive:true });

    function animateParticles(){
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      for(let i = 0; i < particles.length; i++){
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;

        if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if(p.y < 0 || p.y > canvas.height) p.vy *= -1;

        if(mouse.x !== null && mouse.y !== null){
          const dx = p.x - mouse.x;
          const dy = p.y - mouse.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if(dist < mouse.radius){
            p.x += dx / 45;
            p.y += dy / 45;
          }
        }

        ctx.beginPath();
        ctx.fillStyle = "rgba(255,210,255," + p.a + ")";
        ctx.shadowBlur = 24;
        ctx.shadowColor = "#b366ff";
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }

      for(let a = 0; a < particles.length; a++){
        for(let b = a + 1; b < particles.length; b++){
          const dx = particles[a].x - particles[b].x;
          const dy = particles[a].y - particles[b].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if(dist < 105){
            ctx.beginPath();
            ctx.strokeStyle = "rgba(220,180,255," + (0.22 - dist / 900) + ")";
            ctx.lineWidth = .9;
            ctx.moveTo(particles[a].x, particles[a].y);
            ctx.lineTo(particles[b].x, particles[b].y);
            ctx.stroke();
          }
        }
      }

      requestAnimationFrame(animateParticles);
    }

    resizeCanvas();
    animateParticles();
  </script>
